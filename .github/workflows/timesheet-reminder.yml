name: Timesheet reminder

on:
  # Расписание теперь не через GitHub cron (бесплатный тариф ненадёжен —
  # опоздания на часы вплоть до пропуска запуска) — запуск дёргает
  # планировщик Cowork через workflow_dispatch по расписанию 10:15 МСК.
  workflow_dispatch: {}

jobs:
  reminder:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python reminder.py
        env:
          BITRIX_WEBHOOK: ${{ secrets.BITRIX_WEBHOOK }}
