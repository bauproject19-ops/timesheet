name: Timesheet reminder

on:
  schedule:
    # Специально НЕ на круглой минуте (:00/:30) — на них GitHub Actions
    # массово ставит cron-запуски в очередь при высокой нагрузке, из-за
    # чего реальный старт может откладываться на часы. Смещаем на "рваную"
    # минуту, чтобы не попадать в пиковую очередь.
    - cron: '37 14 * * *'  # ~17:37 МСК (UTC+3)
  workflow_dispatch: {}

jobs:
  reminder:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python reminder.py
        env:
          BITRIX_WEBHOOK: ${{ secrets.BITRIX_WEBHOOK }}
