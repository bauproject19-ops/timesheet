name: Timesheet report - employees and objects

on:
  # Расписание теперь не через GitHub cron — см. комментарий в
  # timesheet-reminder.yml. Запуск дёргает планировщик Cowork (10:35 МСК).
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python report_employees_objects.py
        env:
          BITRIX_WEBHOOK: ${{ secrets.BITRIX_WEBHOOK }}
